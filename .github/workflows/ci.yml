name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build (warnings are errors)
        run: dotnet build -c Release

      - name: Test (with coverage)
        run: dotnet test -c Release --no-build --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        with:
          files: ./TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Demo run (offline, no credentials)
        run: dotnet run -c Release --no-build --project src/AbstentionBench -- demo

      # Exercise the passing path and both failure directions so the gate cannot silently rot into
      # "always fails" or "never enforces". The label oracle passes by construction from case labels.
      - name: Gate passes for the label oracle policy
        run: |
          dotnet run -c Release --no-build --project src/AbstentionBench -- \
            demo --only LabelOracleBaseline --gate 0.9 --gate-answer-acc 0.9

      - name: Gate fails for the always-answer policy
        run: |
          if dotnet run -c Release --no-build --project src/AbstentionBench -- \
               demo --only AlwaysAnswerBaseline --gate 0.9; then
            echo "::error::--gate exited 0 for a model with 0% abstention recall — the gate is not enforcing."
            exit 1
          fi
          echo "gate correctly failed the run"

      # Abstention-recall is trivially maximised by never answering. A recall-only gate is passed by
      # the always-abstain policy, so the answer-accuracy floor must catch it.
      - name: Gate fails for the always-abstain policy
        run: |
          dotnet run -c Release --no-build --project src/AbstentionBench -- \
            demo --only AlwaysAbstainBaseline --gate 0.9 \
            || { echo "::error::a 100%-abstention model should PASS a recall-only gate; that it did not means the gate is wrong."; exit 1; }

          if dotnet run -c Release --no-build --project src/AbstentionBench -- \
               demo --only AlwaysAbstainBaseline --gate 0.9 --gate-answer-acc 0.9; then
            echo "::error::a model that answers nothing cleared a gate with an answer-accuracy floor."
            exit 1
          fi
          echo "gate correctly failed the model that answers nothing"
