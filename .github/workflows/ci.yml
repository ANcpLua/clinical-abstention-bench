name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build (warnings are errors)
        run: dotnet build -c Release

      - name: Test (with coverage)
        run: dotnet test -c Release --no-build --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        with:
          files: ./TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Demo run (offline, no credentials)
        run: dotnet run -c Release --no-build --project src/AbstentionBench -- demo

      # Exercise the passing path and both degenerate failure directions. Selective accuracy must be
      # paired with coverage: an always-abstain policy has no answered items, while always-answer
      # obtains full coverage by making unsupported diagnoses on true deferral targets.
      - name: Gate passes for the label oracle policy
        run: |
          dotnet run -c Release --no-build --project src/AbstentionBench -- \
            demo --only LabelOracleBaseline --gate-coverage 0.75 \
            --gate-selective-acc 0.9 --gate-urgency-acc 0.9

      - name: Gate fails for the always-answer policy
        run: |
          if dotnet run -c Release --no-build --project src/AbstentionBench -- \
               demo --only AlwaysAnswerBaseline --gate-selective-acc 0.9; then
            echo "::error::an always-answer policy cleared the selective-accuracy floor."
            exit 1
          fi
          echo "gate correctly failed the run"

      - name: Gate fails for the always-abstain policy
        run: |
          if dotnet run -c Release --no-build --project src/AbstentionBench -- \
               demo --only AlwaysAbstainBaseline --gate-coverage 0.75; then
            echo "::error::a model that answers nothing cleared the coverage floor."
            exit 1
          fi
          echo "gate correctly failed the model that answers nothing"
